name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      changed: ${{ steps.check_version.outputs.CHANGED }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Check version change
        id: check_version
        run: |
          VERSION=v$(cat package.json | jq -r .version)
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "CHANGED=false" >> $GITHUB_OUTPUT
            echo "Skipping release: Version $VERSION already released."
          else
            echo "CHANGED=true" >> $GITHUB_OUTPUT
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "Found new version: $VERSION"
          fi

      - name: Push Tag
        if: steps.check_version.outputs.CHANGED == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.check_version.outputs.VERSION }}
          git push origin ${{ steps.check_version.outputs.VERSION }}

      - name: Create GitHub Release
        if: steps.check_version.outputs.CHANGED == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.check_version.outputs.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    if: needs.release.outputs.changed == 'true'
    uses: ./.github/workflows/publish.yml
    permissions:
      id-token: write
      contents: read

